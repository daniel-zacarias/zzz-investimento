spring:
  application:
    name: investment-service
  datasource:
    url: jdbc:postgresql://localhost:5433/investments
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: investments
  flyway:
    enabled: true
    locations: classpath:db/migration
    create-schemas: true
    schemas: investments

server:
  port: 8081
  servlet:
    context-path: /api

wallet-service:
  base-url: http://localhost:8080
